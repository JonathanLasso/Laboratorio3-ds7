<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Registro de contacto</title>
</head>
<body style="background-color: black; text-align: center; color: white; display: flex; place-items: center; margin: 0; min-height: 100vh;">
<div class="container">
    <h1 style="padding: 10px">Laboratorio #3</h1>
    <h2>Integrantes:</h2>
        <p>De Freitas, Ricardo, 8-769-2017</p>
        <p>Lasso, Jonathan, 8-1034-308</p>
    <h2>Formulario de registro de contacto</h2>
    <form method="post" action="../Clases/ProcesarDatos.php">
        <div class="mb-3">
            <label class="col-form-label-lg" for="nombre">Nombre:</label>
            <div>
                <input class="form-control-lg" type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre" required style="width: 350px; text-align: center">
            </div>
        </div>
        <div class="mb-3">
            <label class="col-form-label-lg" for="correo">Correo electrónico:</label>
            <div>
                <input class="form-control-lg" type="email" id="correo" name="correo" placeholder="Ingrese su correo" required style="width: 350px; text-align: center">
            </div>
        </div>
        <div class="mb-3">
            <label class="col-form-label-lg" for="cedula">Cédula:</label>
            <div>
                <input class="form-control-lg" type="text" id="cedula" name="cedula" placeholder="Ingrese su cédula" required style="width: 350px; text-align: center">
            </div>
        </div>
        <div class="mb-3">
            <label class="col-form-label-lg" for="edad">Edad:</label>
            <div>
                <input class="form-control-lg" type="number" id="edad" name="edad" placeholder="Ingrese su edad" min="1" required style="width: 350px; text-align: center">
            </div>
        </div>
        <input class="btn btn-success" type="submit" value="Enviar" style="margin: 10px">
        <input class="btn btn-danger" type="reset" value="Borrar">
    </form>
</div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
